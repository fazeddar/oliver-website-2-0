<!DOCTYPE html>
<html lang="en">
<!--
=================================================================
    ONE FILE MULTI-GAME SETUP (SAFE WAY)

    ID RULE (must match exactly):
    - button id in index.html == game id in apps.html
    - data-src must be: apps.html#same-id

    BUTTON EXAMPLE (index.html):
        <button id="slope" class="outline-button" data-src="apps.html#slope">slope</button>

    SAFE GAME TEMPLATE (apps.html):
        window.inlineGames = window.inlineGames || {};
        window.inlineGames.slope = function (root) {
            const BASE_URL = 'https://example.com/slope/';

            root.style.padding = '0';
            root.style.display = 'block';
            root.style.minHeight = '100vh';
            root.innerHTML = `
                <div class="slope-wrap">
                    <canvas id="slope-canvas"></canvas>
                </div>
            `;

            // Load external scripts/files here
            // Do not replace document.body here
        };

    IMPORTANT (prevents black screen / broken other games):
    1) Do NOT paste a full HTML document into a game block.
       Remove: <!doctype>, <html>, <head>, <body>, </html>.
    2) Do NOT use document.body.innerHTML = ... inside game loaders.
       Only write into root (root.innerHTML = ...).
    3) Do NOT add global styles like html{}, body{}, canvas{}.
       Scope styles to #inlineGameRoot, .your-game-wrap, or game-specific ids.
    4) If a game injects a fullscreen loading overlay, remove/hide it after load.
       Otherwise it can sit on top and look like a black screen.
    5) Use a unique game id and match button/data-src exactly.
    6) Use absolute URLs or BASE_URL for remote assets.
       Relative links without BASE_URL often break and leave a black canvas.

    QUICK ADD CHECKLIST:
    - Add button in index.html: id="newgame" data-src="apps.html#newgame"
    - Add loader in apps.html: window.inlineGames.newgame = function(root){...}
    - Keep all DOM/style changes scoped to root
    - Test: open old games again after adding new one
=================================================================
-->

    <script>
        window.inlineGames = window.inlineGames || {};

        function showInlineGame(gameId) {
            const root = document.createElement('main');
            root.id = 'inlineGameRoot';
            root.style.minHeight = '100vh';
            root.style.display = 'grid';
            root.style.placeItems = 'center';
            root.style.padding = '24px';
            root.style.background = '#0b1020';
            root.style.color = '#eef2ff';
            root.style.fontFamily = 'Segoe UI, Tahoma, Geneva, Verdana, sans-serif';
            document.body.innerHTML = '';
            document.body.appendChild(root);

            const gameFactory = window.inlineGames[gameId];
            if (typeof gameFactory === 'function') {
                gameFactory(root);
                return;
            }

            root.innerHTML = `
                <section style="max-width:760px;border:1px solid rgba(255,255,255,.2);border-radius:14px;padding:18px;background:rgba(255,255,255,.06)">
                    <h1 style="margin:0 0 10px;font-size:1.2rem;text-transform:uppercase;letter-spacing:.06em">Game ID Not Found</h1>
                    <p style="margin:0 0 8px">No game code is registered for id: <strong>${gameId}</strong></p>
                    <p style="margin:0;opacity:.85">Add this in apps.html: window.inlineGames["${gameId}"] = function(root) { /* game */ };</p>
                </section>`;
        }

        // Ultimate Game Stash file
        // For the regularly updating doc go to:
        // https://docs.google.com/document/d/1_FmH3BlSBQI7FGgAQL59-ZPe8eCxs35wel6JUyVaG8Q/
        window.inlineGames.buildnow = function (root) {
            const BASE_URL = 'https://cdn.jsdelivr.net/gh/genizy/cg-rip@main/buildnow-gg/';
            const SPLIT_MAP = {
                '7db022abd161455e3cc5f207e75d294b.wasm': null,
                'ab8dd356a41a2943639294657a0990f8.data': null,
            };

            root.style.padding = '0';
            root.style.display = 'block';
            root.style.background = '#000';
            root.innerHTML = `
                <div id="loading-text" style="color:black;font-size:48px;font-family:cursive;text-align:center;margin-top:20px;position:relative;z-index:2;background:#fff;">LOADING...</div>
                <canvas id="unity-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;outline:none"></canvas>
            `;

            async function mergeParts(baseUrl) {
                const parts = [];
                for (let i = 1; i <= 99; i++) {
                    const testUrl = `${baseUrl}.part${i}`;
                    try {
                        const head = await fetch(testUrl, { method: 'HEAD' });
                        if (!head.ok) break;
                        parts.push(testUrl);
                    } catch {
                        break;
                    }
                }

                if (parts.length === 0) return baseUrl;

                const buffers = await Promise.all(parts.map(async partUrl => {
                    const response = await fetch(partUrl);
                    if (!response.ok) throw new Error(`Failed part ${partUrl}`);
                    return new Uint8Array(await response.arrayBuffer());
                }));

                const total = buffers.reduce((sum, buffer) => sum + buffer.length, 0);
                const merged = new Uint8Array(total);
                let offset = 0;
                for (const buffer of buffers) {
                    merged.set(buffer, offset);
                    offset += buffer.length;
                }

                return URL.createObjectURL(new Blob([merged]));
            }

            async function preMergeAll() {
                const mergedMap = {};
                const files = Object.keys(SPLIT_MAP);
                const total = files.length;
                let done = 0;
                const loadingText = document.getElementById('loading-text');

                for (const fileName of files) {
                    const merged = await mergeParts(`${BASE_URL}Build/${fileName}`);
                    mergedMap[fileName] = merged;
                    done++;
                    const percent = Math.floor((done / total) * 100);
                    if (loadingText) {
                        loadingText.innerText = `LOADING... ${percent}%`;
                    }
                    console.log('Premerged:', fileName, '->', merged);
                }

                if (loadingText) {
                    loadingText.style.display = 'none';
                }

                return mergedMap;
            }

            (async () => {
                const mergedMap = await preMergeAll();
                window.SPLIT_MAP = mergedMap;

                const originalFetch = window.fetch.bind(window);
                window.fetch = async function (resource, options) {
                    if (typeof resource === 'string') {
                        const key = resource.split('/').pop();
                        if (key && mergedMap[key]) {
                            console.log('Redirect fetch:', key);
                            return originalFetch(mergedMap[key], options);
                        }

                        if (resource.includes('StreamingAssets')) {
                            const suffix = resource.split('/StreamingAssets/')[1] || '';
                            return originalFetch(`${BASE_URL}StreamingAssets/${suffix}`, options);
                        }
                    }
                    return originalFetch(resource, options);
                };

                const OriginalXHR = window.XMLHttpRequest;
                window.XMLHttpRequest = function () {
                    const xhr = new OriginalXHR();
                    const originalOpen = xhr.open;
                    xhr.open = function (method, url, ...rest) {
                        const key = typeof url === 'string' ? url.split('/').pop() : '';
                        if (key && mergedMap[key]) {
                            console.log('Redirect XHR:', key);
                            originalOpen.call(xhr, method, mergedMap[key], ...rest);
                        } else {
                            originalOpen.call(xhr, method, url, ...rest);
                        }
                    };
                    return xhr;
                };

                const canvas = document.getElementById('unity-canvas');
                const loaderUrl = `${BASE_URL}Build/7a2dbded24d57e056180125b1583e7c4.loader.js`;
                const config = {
                    dataUrl: `${BASE_URL}Build/ab8dd356a41a2943639294657a0990f8.data`,
                    frameworkUrl: `${BASE_URL}Build/91a2bfcec140bc524100478b99a4f6d7.framework.js`,
                    codeUrl: `${BASE_URL}Build/7db022abd161455e3cc5f207e75d294b.wasm`,
                    streamingAssetsUrl: `${BASE_URL}StreamingAssets`,
                    companyName: 'BuildNow GG',
                    productName: 'BuildNow GG',
                    productVersion: '1.0.0',
                };

                const script = document.createElement('script');
                script.src = loaderUrl;
                script.onload = () => {
                    createUnityInstance(canvas, config, () => {
                        // Progress UI is handled by loading text above.
                    }).then(unityInstance => {
                        window.gameInstance = unityInstance;
                    }).catch(message => alert(message));
                };
                document.body.appendChild(script);
            })();

            function resizeCanvas() {
                const canvas = document.getElementById('unity-canvas');
                if (!canvas) return;
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.style.width = `${window.innerWidth}px`;
                canvas.style.height = `${window.innerHeight}px`;
            }

            window.addEventListener('load', resizeCanvas);
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        };

        window.inlineGames.gettingoverit = function (root) {
            const BASE_URL = 'https://cdn.jsdelivr.net/gh/genizy/web-port@main/getting-over-it/';

            root.style.padding = '0';
            root.style.display = 'block';
            root.style.minHeight = '100vh';
            root.style.background = '#231F20';
            root.innerHTML = `
                <div id="loading-text" style="color:white;font-size:32px;font-family:cursive;text-align:center;margin-top:20px;">LOADING...</div>
                <div id="unity-container" class="unity-desktop" style="width:100%;height:100%;">
                    <canvas id="unity-canvas" tabindex="-1" style="width:100%;height:100%;display:block;"></canvas>
                    <div id="unity-loading-bar">
                        <div id="unity-logo"></div>
                        <div id="unity-progress-bar-empty">
                            <div id="unity-progress-bar-full"></div>
                        </div>
                    </div>
                </div>
            `;

            const loadingText = document.querySelector('#loading-text');
            const loaderCss = document.createElement('link');
            loaderCss.rel = 'stylesheet';
            loaderCss.href = `${BASE_URL}TemplateData/style.css`;
            document.head.appendChild(loaderCss);

            let totalBytes = 691732588;
            let loadedBytes = 0;

            function formatSize(bytes) {
                if (bytes > 1024 * 1024 * 1024) {
                    return `${(bytes / (1024 * 1024 * 1024)).toFixed(2)} GB`;
                }
                if (bytes > 1024 * 1024) {
                    return `${(bytes / (1024 * 1024)).toFixed(2)} MB`;
                }
                if (bytes > 1024) {
                    return `${(bytes / 1024).toFixed(2)} KB`;
                }
                return `${bytes} B`;
            }

            async function fetchWithProgress(url) {
                const response = await fetch(url);
                if (!response.ok || !response.body) {
                    throw new Error(`Failed to fetch ${url}`);
                }

                const reader = response.body.getReader();
                const chunks = [];
                let received = 0;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    received += value.length;
                    loadedBytes += value.length;
                    chunks.push(value);
                    const doneText = formatSize(loadedBytes);
                    const totalText = formatSize(totalBytes);
                    const percent = totalBytes > 0 ? ((loadedBytes / totalBytes) * 100).toFixed(1) : '?';
                    if (loadingText) {
                        loadingText.textContent = `LOADING... ${doneText} / ${totalText} (${percent}%)`;
                    }
                }

                const fullBuffer = new Uint8Array(received);
                let offset = 0;
                for (const chunk of chunks) {
                    fullBuffer.set(chunk, offset);
                    offset += chunk.length;
                }
                return fullBuffer.buffer;
            }

            async function mergeFiles(parts) {
                const buffers = await Promise.all(parts.map(fetchWithProgress));
                return URL.createObjectURL(new Blob(buffers));
            }

            function getParts(file, count) {
                const parts = [];
                for (let i = 1; i <= count; i++) {
                    parts.push(`${BASE_URL}${file}.part${i}`);
                }
                return parts;
            }

            (async () => {
                try {
                    const dataParts = getParts('Build/GettingOverIt.data', 32);
                    const wasmParts = getParts('Build/GettingOverIt.wasm', 2);

                    const [dataUrl, wasmUrl] = await Promise.all([
                        mergeFiles(dataParts),
                        mergeFiles(wasmParts),
                    ]);

                    const container = document.querySelector('#unity-container');
                    const canvas = document.querySelector('#unity-canvas');
                    const loadingBar = document.querySelector('#unity-loading-bar');
                    const progressBarFull = document.querySelector('#unity-progress-bar-full');

                    const loaderUrl = `${BASE_URL}Build/GettingOverIt.loader.js`;
                    const config = {
                        dataUrl,
                        frameworkUrl: `${BASE_URL}Build/GettingOverIt.framework.js`,
                        codeUrl: wasmUrl,
                        streamingAssetsUrl: `${BASE_URL}StreamingAssets`,
                        companyName: 'Bennett Foddy',
                        productName: 'Getting Over It',
                        productVersion: '1.7',
                        showBanner: () => {},
                    };

                    if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
                        const meta = document.createElement('meta');
                        meta.name = 'viewport';
                        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
                        document.head.appendChild(meta);
                        if (container) {
                            container.className = 'unity-mobile';
                        }
                        if (canvas) {
                            canvas.className = 'unity-mobile';
                        }
                    } else {
                        function resizeCanvas() {
                            if (!canvas) return;
                            canvas.width = window.innerWidth;
                            canvas.height = window.innerHeight;
                            canvas.style.width = `${window.innerWidth}px`;
                            canvas.style.height = `${window.innerHeight}px`;
                        }

                        window.addEventListener('resize', resizeCanvas);
                        resizeCanvas();
                    }

                    if (loadingBar) {
                        loadingBar.style.display = 'block';
                    }

                    const script = document.createElement('script');
                    script.src = loaderUrl;
                    script.onload = () => {
                        createUnityInstance(canvas, config, progress => {
                            if (progressBarFull) {
                                progressBarFull.style.width = `${100 * progress}%`;
                            }
                        }).then(() => {
                            if (loadingBar) {
                                loadingBar.style.display = 'none';
                            }
                            loadingText?.remove();
                        }).catch(message => {
                            alert(message);
                        });
                    };

                    document.body.appendChild(script);
                } catch (error) {
                    if (loadingText) {
                        loadingText.textContent = 'Failed to load game files.';
                    }
                    console.error(error);
                }
            })();
        };

        window.inlineGames.buckshot = function (root) {
            const BASE_URL = 'https://cdn.jsdelivr.net/gh/genizy/web-port@main/buckshot-roulette/';

            root.style.padding = '0';
            root.style.display = 'block';
            root.style.minHeight = '100vh';
            root.style.background = '#000';

            const styleLink = document.createElement('link');
            styleLink.rel = 'stylesheet';
            styleLink.href = `${BASE_URL}style.css`;
            document.head.appendChild(styleLink);

            root.innerHTML = `
                <div id="loading-text" style="color:white;font-family:cursive;font-size:48px;text-align:center;margin-top:20px;">LOADING...</div>
                <canvas id="canvas">Your browser does not support the canvas tag.</canvas>
                <div id="status">
                    <img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="${BASE_URL}buckshot-roulette.png" alt="">
                    <progress id="status-progress"></progress>
                    <div id="status-notice"></div>
                </div>
            `;

            function loadScript(src) {
                return new Promise((resolve, reject) => {
                    const script = document.createElement('script');
                    script.src = src;
                    script.onload = resolve;
                    script.onerror = () => reject(new Error(`Failed to load script: ${src}`));
                    document.body.appendChild(script);
                });
            }

            (async () => {
                try {
                    await loadScript(`${BASE_URL}buckshot-roulette.js`);

                    const GODOT_CONFIG = {
                        args: [],
                        canvasResizePolicy: 2,
                        ensureCrossOriginIsolationHeaders: false,
                        executable: `${BASE_URL}buckshot-roulette`,
                        experimentalVK: false,
                        fileSizes: {
                            'buckshot-roulette.pck': 344705792,
                            'buckshot-roulette.wasm': 43444261,
                        },
                        focusCanvas: false,
                        gdextensionLibs: [],
                    };

                    const GODOT_THREADS_ENABLED = false;
                    const engine = new Engine(GODOT_CONFIG);

                    function run() {
                        const loadingText = document.getElementById('loading-text');
                        const statusOverlay = document.getElementById('status');
                        const statusProgress = document.getElementById('status-progress');
                        const statusNotice = document.getElementById('status-notice');
                        loadingText?.remove();

                        let initializing = true;
                        let statusMode = '';

                        function setStatusMode(mode) {
                            if (statusMode === mode || !initializing) {
                                return;
                            }
                            if (mode === 'hidden') {
                                statusOverlay?.remove();
                                initializing = false;
                                return;
                            }
                            if (!statusOverlay || !statusProgress || !statusNotice) {
                                return;
                            }
                            statusOverlay.style.visibility = 'visible';
                            statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
                            statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
                            statusMode = mode;
                        }

                        function setStatusNotice(text) {
                            if (!statusNotice) {
                                return;
                            }
                            while (statusNotice.lastChild) {
                                statusNotice.removeChild(statusNotice.lastChild);
                            }
                            const lines = String(text).split('\n');
                            lines.forEach(line => {
                                statusNotice.appendChild(document.createTextNode(line));
                                statusNotice.appendChild(document.createElement('br'));
                            });
                        }

                        function displayFailureNotice(err) {
                            console.error(err);
                            if (err instanceof Error) {
                                setStatusNotice(err.message);
                            } else if (typeof err === 'string') {
                                setStatusNotice(err);
                            } else {
                                setStatusNotice('An unknown error occurred.');
                            }
                            setStatusMode('notice');
                            initializing = false;
                        }

                        const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
                        if (missing.length !== 0) {
                            const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
                            displayFailureNotice(missingMsg + missing.join('\n'));
                            return;
                        }

                        setStatusMode('progress');
                        engine.startGame({
                            onProgress(current, total) {
                                if (!statusProgress) {

                        }
                        return;

                        const cleanPath = url.split('/').pop();

                        const cache = await caches.open(CACHE_NAME);
                        const cachedResponse = await cache.match(cleanPath);

                        if (!zipBlob) {

                        const files = Object.values(zip.files).filter(file => !file.dir);
                        const total = files.length;
                        const cache = await caches.open(CACHE_NAME);

                        const batchSize = 10;

function setProgress(value){ progressFill.style.width = `${Math.min(value*100, 100)}%`; }

async function mergeUnityWebFiles(baseUrl, filePrefix, totalParts, extension, onProgress) {
  const partUrls = Array.from({ length: totalParts }, (_, i) => `${baseUrl}/${filePrefix}${i + 1}.${extension}`);
  let totalSize = 0;

  for (const url of partUrls) {
    const head = await fetch(url, { method: "HEAD" });
    const len = head.headers.get("Content-Length");
    if (len) totalSize += parseInt(len, 10);
  }

  const buffers = [];
  let downloaded = 0;

  for (const url of partUrls) {
    const res = await fetch(url);
    const reader = res.body.getReader();
    const chunks = [];

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      downloaded += value.length;
      onProgress && onProgress(downloaded / totalSize * 0.5);
    }

    const full = new Uint8Array(chunks.reduce((a, b) => a + b.length, 0));
    let offset = 0;
    for (const chunk of chunks) { full.set(chunk, offset); offset += chunk.length; }
    buffers.push(full);
  }

  const final = new Uint8Array(buffers.reduce((a, b) => a + b.byteLength, 0));
  let offset = 0;
  for (const b of buffers) { final.set(b, offset); offset += b.byteLength; }
  return final;
}

async function initializeGame() {

  try {
    const wasmBuffer = await mergeUnityWebFiles(baseUrl, "set", 2, "js", setProgress);
    const wasmBlob   = new Blob([wasmBuffer], { type: "application/wasm" });
    const wasmUrl    = URL.createObjectURL(wasmBlob);

      };
      const canvas = document.getElementById("unity-canvas");

      createUnityInstance(canvas, config, (unityProgress) => {

function FullAdShow() {
  if (!canShowAd()) { sendYG('CloseInterAdv', 'false'); return; }
  try {
    if (nowFullAdOpen) return;
    nowFullAdOpen = true; lastAdTime = Date.now();
    sendYG('OpenInterAdv');

      sdk.showBanner();
      setTimeout(function () {
        nowFullAdOpen = false;
        sendYG('CloseInterAdv', 'true'); 
        FocusGame();
      }, 3000);

      FocusGame();
    }

    sendYG('ErrorInterAdv');
    sendYG('CloseInterAdv', 'false');

}

function StickyAdActivity(show) {
    try {
        ysdk.adv.getBannerAdvStatus().then(({ stickyAdvIsShowing, reason }) => {
            if (stickyAdvIsShowing) {
                if (!show) {
                    ysdk.adv.hideBannerAdv();
                }
            }
            else if (reason) {
                LogStyledMessage('StickyAdv are not shown. Reason:', reason);
            }
            else if (show) {
                ysdk.adv.showBannerAdv();
            }
        })
    } catch (e) {
        console.error('CRASH StickyAdv activity: ', e.message);
    }
}
